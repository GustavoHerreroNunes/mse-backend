name: Deploy to Cloud Run + API Gateway

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: southamerica-east1
  SERVICE_NAME: mse-api
  IMAGE: southamerica-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/mse-api-repo/mse-api
  API_ID: mse-api-gateway
  GATEWAY_ID: mse-api-gateway
  GATEWAY_LOCATION: us-west2
  BACKEND_SA: msegateway-admin@msesolucoes.iam.gserviceaccount.com

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Authenticate to GCP
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # 3. Set up gcloud CLI
      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # 4. Configure Docker to push to Artifact Registry
      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker southamerica-east1-docker.pkg.dev --quiet

      # 5. Build Docker image
      - name: Build Docker image
        run: |
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest .

      # 6. Push Docker image to Artifact Registry
      - name: Push Docker image
        run: |
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      # 7. Deploy to Cloud Run
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image=$IMAGE:${{ github.sha }} \
            --region=$REGION \
            --project=$PROJECT_ID \
            --quiet

      # 8. Extract version from api-gateway.yaml to use as config name
      - name: Extract API Gateway version
        id: gateway_version
        run: |
          VERSION=$(grep 'version:' api-gateway.yaml | head -1 | awk '{print $2}' | tr -d '"' | tr '.' '-')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "config_name=mse-gateway-live-$VERSION" >> $GITHUB_OUTPUT

      # 9. Deploy new API Gateway config
      - name: Deploy API Gateway config
        run: |
          gcloud api-gateway api-configs create ${{ steps.gateway_version.outputs.config_name }} \
            --api=$API_ID \
            --openapi-spec=api-gateway.yaml \
            --project=$PROJECT_ID \
            --backend-auth-service-account=$BACKEND_SA

      # 10. Activate new config on the gateway
      - name: Activate API Gateway config
        run: |
          gcloud api-gateway gateways update $GATEWAY_ID \
            --api=$API_ID \
            --api-config=${{ steps.gateway_version.outputs.config_name }} \
            --location=$GATEWAY_LOCATION \
            --project=$PROJECT_ID