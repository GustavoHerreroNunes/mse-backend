name: Build and Deploy Container to GCE (Artifact Registry)

on:
  push:
    branches:
      - pdf-generation  # Change to your specific branch
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: southamerica-east1                      # Your Artifact Registry region
  REPOSITORY: pdf-vm-repo                          # Your Artifact Registry repository name
  IMAGE_NAME: pdf-image                               # Your container image name
  INSTANCE_NAME: pdf-generator-vm              # Your VM instance name
  INSTANCE_ZONE: southamerica-east1                       # Your VM zone
  CONTAINER_PORT: 8080                              # Matches your app's port

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      # Configure Docker for Artifact Registry
      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # Optional: Ensure repository exists (if you have permission)
      # - name: Ensure Artifact Registry repository exists
      #   run: |
      #     gcloud artifacts repositories describe ${{ env.REPOSITORY }} \
      #       --location=${{ env.REGION }} || \
      #     gcloud artifacts repositories create ${{ env.REPOSITORY }} \
      #       --repository-format=docker \
      #       --location=${{ env.REGION }} \
      #       --description="Docker repository for my app"

      # Build and tag the Docker image
      - name: Build Docker image
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                      -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest .

      # Push both tags
      - name: Push Docker image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest

      # Deploy to Compute Engine VM (Container-Optimized OS)
      - name: Deploy to Compute Engine VM
        run: |
          gcloud compute instances update-container ${{ env.INSTANCE_NAME }} \
            --zone ${{ env.INSTANCE_ZONE }} \
            --container-image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --container-name my-app-container \
            --container-restart-policy always \
            --container-env ENVIRONMENT=production

      - name: Wait for deployment to stabilize
        run: sleep 30

      - name: Health check
        run: |
          EXTERNAL_IP=$(gcloud compute instances describe ${{ env.INSTANCE_NAME }} \
            --zone ${{ env.INSTANCE_ZONE }} \
            --format='get(networkInterfaces[0].accessConfigs[0].natIP)')
          curl -f http://${EXTERNAL_IP}:${{ env.CONTAINER_PORT }}/health || exit 1