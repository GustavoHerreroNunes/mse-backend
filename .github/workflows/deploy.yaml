name: Deploy PDF Generator to GCE VM

on:
  push:
    branches:
      - pdf-generation
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: southamerica-east1
  REPOSITORY: pdf-vm-repo
  IMAGE_NAME: pdf-image
  IMAGE: southamerica-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/pdf-vm-repo/pdf-image
  INSTANCE_NAME: pdf-generator-vm
  INSTANCE_ZONE: southamerica-east1-a

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Authenticate to GCP
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # 3. Set up gcloud CLI
      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      # 4. Configure Docker for Artifact Registry
      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # 5. Build Docker image
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest .

      # 6. Push Docker image to Artifact Registry
      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      # 7. SSH into VM, pull new image and restart container
      - name: Deploy to VM
        run: |
          gcloud compute ssh ${{ env.INSTANCE_NAME }} \
            --zone=${{ env.INSTANCE_ZONE }} \
            --project=${{ env.PROJECT_ID }} \
            --tunnel-through-iap \
            --command="
              # Authenticate Docker to Artifact Registry
              gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

              # Pull the new image
              docker pull ${{ env.IMAGE }}:${{ github.sha }}

              # Stop and remove the existing container if running
              docker stop pdf-generator || true
              docker rm pdf-generator || true

              # Run the new container
              docker run -d \
                --name pdf-generator \
                --restart unless-stopped \
                --env-file /app/.env \
                ${{ env.IMAGE }}:${{ github.sha }}

              # Clean up old images to save disk space
              docker image prune -f
            "