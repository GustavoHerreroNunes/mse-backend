        path_translation: APPEND_PATH_TO_ADDRESS
        jwt_audience: https://mse-api-ayddoiktrq-rj.a.run.app
    get:
      tags:
        - Demandas
      summary: Get all survey demands assigned to a specific surveyor
      description: |
        Retrieves all survey demands assigned to a specific surveyor, identified by their user ID.

        Supports two optional filters:
        - **status**: accepts multiple comma-separated values (e.g., `status=Pending,Active`) to filter demands by the **survey_status** field.
        - **forToday**: if set to **true**, returns only demands whose delivery date (`dt_entrega`) matches the current date.

        Each returned demand includes client information, associated vessel details, survey status, and the number of linked tasks.

        If a validation error occurs (e.g., invalid status value), a 400 response will be returned with details.

      operationId: get_demandas_by_user
      parameters:
        - in: path
          name: user_id
          required: true
          type: integer
          description: "Unique identifier of the surveyor user"
        - in: query
          name: status
          required: false
          type: string
          description: "Optional status filter. Accepts multiple comma-separated values (e.g., Awaiting to Start,Pending,Active)"
        - in: query
          name: forToday
          required: false
          type: boolean
          description: "If true, returns only demands with a delivery date equal to today's date"
        - in: header
          name: x-api-key
          required: true
          type: string
          description: "API key for authentication"
      responses:
        "200":
          description: "Lista de demandas atribuídas ao vistoriador"
          schema:
            type: array
            items:
              type: object
              properties:
                id_demanda:
                  type: integer
                  example: 42
                nome_demanda:
                  type: string
                  example: "Vistoria Anual Navio Mercante XYZ"
                id_pasta_gd_demanda:
                  type: integer
                  example: "XFTY762SS34"
                survey_status:
                  type: string
                  example: "Active"
                client_id:
                  type: integer
                  example: 15
                client_name:
                  type: string
                  example: "Navegação Brasileira Ltda."
                vessel_id:
                  type: integer
                  example: 78
                vessel_name:
                  type: string
                  example: "NS Almirante"
                imo_number:
                  type: integer
                  example: 9876543
                dt_entrega:
                  type: string
                  format: date
                  example: "2023-08-15"
                opening_date:
                  type: string
                  format: date
                  example: "2023-08-10"
                rating:
                  type: string
                  example: "Alta"
                location:
                  type: string
                  example: "Porto de Santos"
                vessel_type:
                  type: string
                  example: "Cargueiro"
                have_arrived:
                  type: boolean
                  example: true
                time_confimation:
                  type: string
                  format: date-time
                  example: "2023-08-15T14:30:00"
                location_confirmation:
                  type: string
                  example: "Doca 3 - Ponta da Praia"
                tasks_count:
                  type: integer
                  example: 8
        "400":
          description: "Parâmetro de status inválido"
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Validation Error"
              details:
                type: object
        "500":
          description: "Erro interno do servidor"
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Erro ao recuperar demandas"
      security:
        - api_key: []
      x-google-backend:
        address: https://mse-api-ayddoiktrq-rj.a.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
        jwt_audience: https://mse-api-ayddoiktrq-rj.a.run.app

