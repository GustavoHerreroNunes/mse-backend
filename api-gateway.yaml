        path_translation: APPEND_PATH_TO_ADDRESS
        jwt_audience: https://mse-api-ayddoiktrq-rj.a.run.app
  /surveyor/users/email/{email}:
    options:
      tags:
        - Options
      summary: Requisição CORS preflight para operações em usuário específico
      description: |
        Gerencia requisições CORS preflight para operações em um usuário vistoriador específico.
      operationId: options_surveyor_user_email
      parameters:
        - in: path
          name: email
          required: true
          type: string
          description: "email do usuário"
      responses:
        200:
          description: "Resposta CORS preflight bem-sucedida"
          headers:
            Access-Control-Allow-Origin:
              type: "string"
              description: "Domínios permitidos"
            Access-Control-Allow-Methods:
              type: "string"
              description: "Métodos HTTP permitidos"
            Access-Control-Allow-Headers:
              type: "string"
              description: "Cabeçalhos HTTP permitidos"
            Access-Control-Max-Age:
              type: "string"
              description: "Duração do cache de preflight"
      security: []
      x-google-backend:
        address: https://mse-api-ayddoiktrq-rj.a.run.app/
        path_translation: APPEND_PATH_TO_ADDRESS
        jwt_audience: https://mse-api-ayddoiktrq-rj.a.run.app
    get:
      tags:
        - Users Surveyor
      summary: Get a specific surveyor user by email
      description: |
        Retrieves detailed profile information for a specific surveyor user identified by their email address.
        Useful for viewing surveyor account details and managing individual surveyor profiles.
      operationId: get_user_surveyor_email
      parameters:
        - in: path
          name: email
          required: true
          type: string
          description: "Email address of the surveyor user"
        - in: "header"
          name: "x-api-key"
          required: true
          type: string
          description: "API key for authentication"
      responses:
        "200":
          description: "Detalhes do usuário vistoriador"
          schema:
            type: object
            properties:
              id:
                type: integer
                description: "Identificador único do usuário"
                example: 42
              email:
                type: string
                description: "Email do usuário"
                example: "joao.silva@example.com"
        "404":
          description: "Usuário não encontrado"
          schema:
            type: object
            properties:
              error:
                type: string
                description: "Mensagem de erro"
                example: "User not found"
        "500":
          description: "Erro interno do servidor"
          schema:
            type: object
            properties:
