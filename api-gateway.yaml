      description: |
        Recupera todas as demandas atribuídas a um surveyor específico, identificado pelo seu ID.

        Suporta dois filtros opcionais:
        - **status**: pode receber múltiplos valores separados por vírgula (por exemplo, `status=Pending,Active`), que serão usados para filtrar as demandas pelo campo **survey_status**.
        - **forToday**: se definido como **true**, retorna apenas as demandas cuja data de entrega (`dt_entrega`) é igual à data atual.

        Cada demanda retornada inclui informações do cliente, da embarcação associada, status da vistoria e número de tarefas vinculadas.

        Em caso de erro de validação (por exemplo, status inválido), uma resposta 400 será retornada com os detalhes.

