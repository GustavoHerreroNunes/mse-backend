swagger: "2.0"
info:
  title: MSE (Test) Gateway
  description: The Test Environent for the API Gateway MSE-Central service - an API dedicated to accessing and manipulating data shared between different projects
  version: 1.0.6
tags:
  - name: Cargo
    description: Cargo management endpoints
  - name: Relation
    description: Relation management endpoints
  - name: Tarefas
    description: Tarefas endpoints
  - name: Checklist
    description: Checklist endpoints
  - name: Lifting Material
    description: Lifting material management endpoints
  - name: Statement of Facts
    description: Statement of facts and operation logs management endpoints
  - name: Lifting Operation
    description: Lifting operation management endpoints
  - name: Cargo Storage
    description: Cargo storage management endpoints
  - name: Cargo Condition
    description: Cargo condition management endpoints
  - name: Lashing Cargo
    description: Lashing cargo management endpoints
  - name: Survey PDF
    description: Survey PDF management endpoints
  - name: Lashing Material
    description: Lashing material management endpoints
  - name: Cargo Inspection
    description: Cargo inspection management endpoints
  - name: Lifting Inspection
    description: Lifting inspection management endpoints
  - name: Lashing Inspection
    description: Lashing inspection management endpoints
  - name: Users Surveyor
    description: User management operations for surveyors
  - name: Users Customer
    description: User management operations for customers
  - name: Vessels
    description: Vessel and crane management endpoints
  - name: Notifications
    description: Notification management for surveyors
  - name: Notifications Customer
    description: Notification management for customers
  - name: Attendants
    description: Survey attendant management
  - name: Tasks Survey
    description: Survey boarding task operations
  - name: Customers
    description: MSE Customers management
  - name: Clients
    description: Client photos management
  - name: Demandas
    description: Survey demand management
  - name: AI PDF Generation
    description: Generation of survey reports endpoints
  - name: Offline Provider
    description: Database sync for modile app in offline environments
  - name: Medicoes
    description: Financial measurements, tax invoices, and related fiscal document endpoints
  - name: System
    description: System health and testing endpoints
  - name: Options
    description: CORS Preflight-related endpoints
schemes:
  - https
produces:
  - application/json
paths:
  /survey_pdf/survey/pdf:
    options:
      tags:
        - Options
      summary: Requisição CORS preflight para pdf assinado
      description: |
        Gerencia requisições CORS preflight para o endpoint de envio de pdf assinado.
      operationId: options_pdf
      responses:
        200:
          description: "Resposta CORS preflight bem-sucedida"
          headers:
            Access-Control-Allow-Origin:
              type: "string"
              description: "Domínios permitidos"
            Access-Control-Allow-Methods:
              type: "string"
              description: "Métodos HTTP permitidos"
            Access-Control-Allow-Headers:
              type: "string"
              description: "Cabeçalhos HTTP permitidos"
            Access-Control-Max-Age:
              type: "string"
              description: "Duração do cache de preflight"
      security: []
      x-google-backend:
        address: https://mse-api-ayddoiktrq-rj.a.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
        jwt_audience: https://mse-api-ayddoiktrq-rj.a.run.app
    post:
      tags:
        - Survey PDF
      summary: Upload a signed survey PDF.
      description: |
        Uploads and registers a signed survey PDF document for a given survey demand.
        The PDF file is stored in Google Drive and the resulting URL is persisted in the database, marking the survey report as officially signed and filed.
      operationId: add_pdf
      consumes:
        - multipart/form-data
      parameters:
        - in: header
          name: x-api-key
          required: true
          type: string
          description: "API key for authentication"
        - in: formData
          name: data
          required: true
          type: string
          description: 'JSON string containing the survey demand identifier. Example: {"id_demanda": 42}'
        - in: formData
          name: file
          type: string
          required: false
          description: "The signed survey PDF file to be uploaded"
      responses:
        "201":
          description: "PDF adicionado com sucesso"
          schema:
            type: object
            properties:
              message:
                type: string
                example: "PDF added successfully"
              id_demanda:
                type: string
                properties:
                  id:
                    type: integer
                    description: "ID da demanda atualizada"
                    example: 78
        "400":
          description: "Requisição inválida ou nenhum PDF enviado"
          schema:
            type: object
            properties:
              error:
                type: string
                example: "No valid PDF uploaded"
        "404":
          description: "Demanda não encontrada"
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Demanda not found"
        "500":
          description: "Erro interno do servidor"
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Erro interno"
      security:
        - api_key: []
      x-google-backend:
        address: https://mse-api-ayddoiktrq-rj.a.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
        jwt_audience: https://mse-api-ayddoiktrq-rj.a.run.app
        deadline: 180
  /survey_pdf/{id_demanda}:
    get:
      tags:
        - Survey PDF
      summary: Retrieve survey PDF record
      description: Returns the survey PDF record associated with the given survey demand, including the stored document URL and signing status.
      operationId: get_survey_pdf
      produces:
        - application/json
      parameters:
        - name: id_demanda
          in: path
          required: true
          type: integer
          description: Unique identifier of the survey demand
      responses:
        200:
          description: Dados retornados com sucesso
        500:
          description: Erro ao buscar status PDF
      security:
        - api_key: []
      x-google-backend:
        address: https://mse-api-ayddoiktrq-rj.a.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
        jwt_audience: https://mse-api-ayddoiktrq-rj.a.run.app
    put:
      tags:
        - Survey PDF
      summary: Update survey PDF record
      description: Updates the fields of a survey PDF record identified by the survey demand ID. This endpoint is used to update the document URL or signing status after modifications.
      operationId: update_survey_pdf
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - name: id_demanda
          in: path
          required: true
          type: integer
          description: Unique identifier of the survey demand
      responses:
        200:
          description: Status PDF atualizado com sucesso
        400:
          description: Erro de validação ou campos ausentes
        404:
          description: Status PDF não encontrado
        500:
          description: Erro ao atualizar status PDF
      security:
        - api_key: []
      x-google-backend:
        address: https://mse-api-ayddoiktrq-rj.a.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
        jwt_audience: https://mse-api-ayddoiktrq-rj.a.run.app
    options:
      tags:
        - Options
      summary: Requisição CORS preflight para ações com survey PDF
      description: Gerencia requisições CORS preflight para ações de GET, PUT e DELETE com survey PDF.
      operationId: options_survey_pdf
      parameters:
        - name: id_demanda
          in: path
          required: true
          type: integer
          description: ID da demanda
      responses:
        200:
          description: Resposta CORS preflight bem-sucedida
          headers:
            Access-Control-Allow-Origin:
              type: string
            Access-Control-Allow-Methods:
              type: string
            Access-Control-Allow-Headers:
              type: string
            Access-Control-Max-Age:
              type: string
      security:
        - api_key: []
      x-google-backend:
        address: https://mse-api-ayddoiktrq-rj.a.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
        jwt_audience: https://mse-api-ayddoiktrq-rj.a.run.app
  /survey_pdf:
    post:
      tags:
        - Survey PDF
      summary: Create a new survey PDF record
      description: Creates a new survey PDF record linked to an existing survey demand. This initializes the PDF tracking entry before the signed document is uploaded.
      operationId: add_survey_pdf
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - name: id_demanda
          in: path
          required: true
          type: integer
          description: Unique identifier of the survey demand
      responses:
        201:
          description: Status PDF criado com sucesso
        404:
          description: Demanda não encontrada
        409:
          description: Status PDF já existe
        500:
          description: Erro ao criar status pdf
      security:
        - api_key: []
      x-google-backend:
        address: https://mse-api-ayddoiktrq-rj.a.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
        jwt_audience: https://mse-api-ayddoiktrq-rj.a.run.app
    options:
      tags:
        - Options
      summary: Requisição CORS preflight para adicionar survey PDF
      description: Gerencia requisições CORS preflight para criação de survey PDF.
      operationId: options_add_survey_pdf
      responses:
        200:
          description: Resposta CORS preflight bem-sucedida
          headers:
            Access-Control-Allow-Origin:
              type: string
            Access-Control-Allow-Methods:
              type: string
            Access-Control-Allow-Headers:
              type: string
            Access-Control-Max-Age:
              type: string
      security:
        - api_key: []
      x-google-backend:
        address: https://mse-api-ayddoiktrq-rj.a.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
        jwt_audience: https://mse-api-ayddoiktrq-rj.a.run.app
  /statement-of-facts/demanda/{demanda_id}:
    get:
      tags:
        - Statement of Facts
      summary: Get all statement of facts entries for a demanda
      description: Retrieves all Statement of Facts event log entries associated with a specific survey demand. The Statement of Facts is an official chronological record of all significant events occurring during a maritime operation.
      operationId: getStatementOfFactsByDemanda
      parameters:
        - name: demanda_id
          in: path
          required: true
          type: integer
          description: Unique identifier of the survey demand
      responses:
        200:
          description: OK
        500:
          description: Internal error
      security:
        - api_key: []
      x-google-backend:
        address: https://mse-api-ayddoiktrq-rj.a.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
        jwt_audience: https://mse-api-ayddoiktrq-rj.a.run.app
    options:
      tags:
        - Options
      summary: Requisição CORS preflight para obter statement of facts por demanda
      description: Gerencia requisições CORS preflight para obter statement of facts por demanda.
      operationId: options_get_statement_of_facts_by_demanda
      parameters:
        - name: demanda_id
          in: path
          required: true
          type: integer
      responses:
        200:
          description: Resposta CORS preflight bem-sucedida
          headers:
            Access-Control-Allow-Origin:
              type: string
            Access-Control-Allow-Methods:
              type: string
            Access-Control-Allow-Headers:
              type: string
            Access-Control-Max-Age:
              type: string
      security: []
      x-google-backend:
        address: https://mse-api-ayddoiktrq-rj.a.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
        jwt_audience: https://mse-api-ayddoiktrq-rj.a.run.app
  /statement-of-facts/demanda/cargo/{cargo_id}:
    get:
      tags:
        - Statement of Facts
      summary: Get all statement of facts entries for a cargo item
      description: Retrieves all Statement of Facts event log entries associated with a specific cargo item being inspected. This allows surveyors to view the event history for a particular cargo within the maritime operation.
      operationId: getStatementOfFactsByCargo
      parameters:
        - name: cargo_id
          in: path
          required: true
          type: integer
          description: Unique identifier of the cargo item
      responses:
        200:
          description: OK
        500:
          description: Internal error
      security:
        - api_key: []
      x-google-backend:
        address: https://mse-api-ayddoiktrq-rj.a.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
        jwt_audience: https://mse-api-ayddoiktrq-rj.a.run.app
    options:
      tags:
        - Options
      summary: Requisição CORS preflight para obter statement of facts por cargo
      description: Gerencia requisições CORS preflight para obter statement of facts por cargo.
      operationId: options_get_statement_of_facts_by_cargo
      parameters:
        - name: cargo_id
          in: path
          required: true
          type: integer
      responses:
        200:
          description: Resposta CORS preflight bem-sucedida
          headers:
            Access-Control-Allow-Origin:
              type: string
            Access-Control-Allow-Methods:
              type: string
            Access-Control-Allow-Headers:
              type: string
            Access-Control-Max-Age:
              type: string
      security: []
      x-google-backend:
        address: https://mse-api-ayddoiktrq-rj.a.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
        jwt_audience: https://mse-api-ayddoiktrq-rj.a.run.app
  /statement-of-facts/{event_id}:
    put:
      tags:
        - Statement of Facts
      summary: Update statement of facts by event ID
      description: Updates a specific Statement of Facts event entry identified by its event ID. This allows surveyors to correct or supplement the logged details of a recorded maritime operation event.
      operationId: updateStatementOfFacts
      consumes:
        - application/json
      parameters:
        - name: event_id
          in: path
          required: true
          type: integer
          description: Unique identifier of the Statement of Facts event entry
        - in: header
          name: x-api-key
          required: true
          type: string
          description: "API key for authentication"
      responses:
        200:
          description: Updated successfully
        400:
          description: Validation error or no fields provided
        404:
          description: Statement of facts not found
        500:
          description: Internal error
      security:
        - api_key: []
      x-google-backend:
        address: https://mse-api-ayddoiktrq-rj.a.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
        jwt_audience: https://mse-api-ayddoiktrq-rj.a.run.app
    delete:
      tags:
        - Statement of Facts
      summary: Delete statement of facts by event ID
      description: Permanently removes a specific Statement of Facts event entry by its event ID. This should be used when an event was logged in error or needs to be removed from the official operation record.
      operationId: deleteStatementOfFacts
      parameters:
        - name: event_id
          in: path
          required: true
          type: integer
          description: Unique identifier of the Statement of Facts event entry
        - in: header
          name: x-api-key
          required: true
          type: string
          description: "API key for authentication"
      responses:
        200:
          description: Deleted successfully
        404:
          description: Statement of facts not found
        500:
          description: Internal error
      security:
        - api_key: []
      x-google-backend:
        address: https://mse-api-ayddoiktrq-rj.a.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
        jwt_audience: https://mse-api-ayddoiktrq-rj.a.run.app
    options:
      tags:
        - Options
      summary: Requisição CORS preflight para operações em statement of facts
      description: Gerencia requisições CORS preflight para operações em statement of facts.
      operationId: options_statement_of_facts_by_id
      parameters:
        - name: event_id
          in: path
          required: true
          type: integer
      responses:
        200:
          description: Resposta CORS preflight bem-sucedida
          headers:
            Access-Control-Allow-Origin:
              type: string
            Access-Control-Allow-Methods:
              type: string
            Access-Control-Allow-Headers:
              type: string
            Access-Control-Max-Age:
              type: string
      security: []
      x-google-backend:
        address: https://mse-api-ayddoiktrq-rj.a.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
        jwt_audience: https://mse-api-ayddoiktrq-rj.a.run.app
  /statement-of-facts/cargo/{event_id}:
    put:
      tags:
        - Statement of Facts
      summary: Update cargo-specific statement of facts by event ID
      description: Updates a cargo-specific Statement of Facts event entry identified by its event ID. This endpoint handles events that are specifically associated with cargo operations, such as cargo loading, discharge, or condition changes.
      operationId: updateStatementOfFactsCargo
      consumes:
        - application/json
      parameters:
        - name: event_id
          in: path
          required: true
          type: integer
          description: Unique identifier of the cargo-related Statement of Facts event entry
        - in: header
          name: x-api-key
          required: true
          type: string
          description: "API key for authentication"
      responses:
        200:
          description: Updated successfully
        400:
          description: Validation error or no fields provided
        404:
          description: Statement of facts not found
        500:
          description: Internal error
      security:
        - api_key: []
      x-google-backend:
        address: https://mse-api-ayddoiktrq-rj.a.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
        jwt_audience: https://mse-api-ayddoiktrq-rj.a.run.app
    delete:
      tags:
        - Statement of Facts
      summary: Delete cargo-specific statement of facts by event ID
      description: Permanently removes a cargo-specific Statement of Facts event entry by its event ID. Use this when a cargo-related event was logged in error or must be removed from the official maritime operation record.
      operationId: deleteStatementOfFactsCargo
      parameters:
        - name: event_id
          in: path
          required: true
          type: integer
          description: Unique identifier of the cargo-related Statement of Facts event entry
        - in: header
          name: x-api-key
          required: true
          type: string
          description: "API key for authentication"
      responses:
        200:
          description: Deleted successfully
        404:
          description: Statement of facts not found
        500:
          description: Internal error
      security:
        - api_key: []
      x-google-backend:
        address: https://mse-api-ayddoiktrq-rj.a.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
        jwt_audience: https://mse-api-ayddoiktrq-rj.a.run.app
    options:
      tags:
        - Options
      summary: Requisição CORS preflight para operações em statement of facts
      description: Gerencia requisições CORS preflight para operações em statement of facts.
      operationId: options_statement_of_facts_by_id_cargo
      parameters:
        - name: event_id
          in: path
          required: true
          type: integer
      responses:
        200:
          description: Resposta CORS preflight bem-sucedida
          headers:
            Access-Control-Allow-Origin:
              type: string
            Access-Control-Allow-Methods:
              type: string
            Access-Control-Allow-Headers:
              type: string
            Access-Control-Max-Age:
              type: string
      security: []
      x-google-backend:
        address: https://mse-api-ayddoiktrq-rj.a.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
        jwt_audience: https://mse-api-ayddoiktrq-rj.a.run.app
  /statement-of-facts:
    post:
      tags:
        - Statement of Facts
      summary: Add new statement of facts entry
      description: Creates a new event entry in the Statement of Facts log for a maritime operation. The Statement of Facts records significant events such as vessel arrival, loading/discharge commencement, delays, and completion times.
      operationId: addStatementOfFacts
      consumes:
        - application/json
      parameters:
        - in: header
          name: x-api-key
          required: true
          type: string
          description: "API key for authentication"
      responses:
        201:
          description: Created
        400:
          description: Missing required fields or validation error
        500:
          description: Internal error
      security:
        - api_key: []
      x-google-backend:
        address: https://mse-api-ayddoiktrq-rj.a.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
        jwt_audience: https://mse-api-ayddoiktrq-rj.a.run.app
    options:
