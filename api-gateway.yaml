      security: []
      x-google-backend:
        address: https://mse-api-ayddoiktrq-rj.a.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
        jwt_audience: https://mse-api-ayddoiktrq-rj.a.run.app
  /statement-of-facts/cargo:
    post:
      tags:
        - Statement of Facts
      summary: Add new cargo-specific statement of facts entry
      description: Creates a new cargo-related event entry in the Statement of Facts log. This endpoint is used to log events specifically associated with cargo operations, such as cargo condition observations, loading events, or cargo-related delays during the maritime survey.
      operationId: addStatementOfFactsCargo
      consumes:
        - application/json
      parameters:
        - in: header
          name: x-api-key
          required: true
          type: string
          description: "API key for authentication"
      responses:
        201:
          description: Created
        400:
