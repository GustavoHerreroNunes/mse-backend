        - Options
      summary: Requisição CORS preflight para adicionar statement of facts
      description: Gerencia requisições CORS preflight para criação de statement of facts.
      operationId: options_post_statement_of_facts
      responses:
        200:
          description: Resposta CORS preflight bem-sucedida
