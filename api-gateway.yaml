      parameters:
        - in: path
          name: customer_id
          required: true
          type: integer
          description: "ID do usuário de cliente"
        - in: query
          name: status
          required: false
          type: string
          description: "Filtro opcional de status. Permite múltiplos valores separados por vírgula (ex: Awaiting to Start,Pending,Active)"
        - in: header
          name: x-api-key
          required: true
