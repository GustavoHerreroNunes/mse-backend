          type: string
          description: "Filtro opcional de status. Permite múltiplos valores separados por vírgula (ex: Awaiting to Start,Pending,Active)"
        - in: query
          name: forToday
          required: false
          type: boolean
          description: "Se verdadeiro (`true`), filtra apenas as demandas com data de entrega igual à data atual"
