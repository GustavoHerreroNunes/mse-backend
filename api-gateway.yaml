paths:
  /survey_pdf/survey/pdf:
    options:
      tags:
        - Options
      summary: Requisição CORS preflight para pdf assinado
      description: |
        Gerencia requisições CORS preflight para o endpoint de envio de pdf assinado.
      operationId: options_pdf
      responses:
        200:
          description: "Resposta CORS preflight bem-sucedida"
          headers:
            Access-Control-Allow-Origin:
              type: "string"
              description: "Domínios permitidos"
            Access-Control-Allow-Methods:
              type: "string"
              description: "Métodos HTTP permitidos"
            Access-Control-Allow-Headers:
              type: "string"
              description: "Cabeçalhos HTTP permitidos"
            Access-Control-Max-Age:
              type: "string"
              description: "Duração do cache de preflight"
      security: []
      x-google-backend:
        address: https://mse-api-152754594972.southamerica-east1.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
    post:
      tags:
        - Survey PDF
      summary: Adicionar pdf assinado.
      description: |
        Registra 1 PDF assinado.
        O PDF é armazenado no Google Drive e o caminho da URL é persistido no banco de dados.
      operationId: add_pdf
      consumes:
        - multipart/form-data
      parameters:
        - in: header
          name: x-api-key
          required: true
          type: string
          description: "Chave API para autenticação"
        - in: formData
          name: data
          required: true
          type: string
          description: 'JSON string contendo id_demanda. Exemplo: {"id_demanda": 42}'
        - in: formData
          name: file
          type: string
          required: false
          description: "Arquivo do PDF assinado"
      responses:
        "201":
          description: "PDF adicionado com sucesso"
          schema:
            type: object
            properties:
              message:
                type: string
                example: "PDF added successfully"
              id_demanda:
                type: string
                properties:
                  id:
                    type: integer
                    description: "ID da demanda atualizada"
                    example: 78
        "400":
          description: "Requisição inválida ou nenhum PDF enviado"
          schema:
            type: object
            properties:
              error:
                type: string
                example: "No valid PDF uploaded"
        "404":
          description: "Demanda não encontrada"
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Demanda not found"
        "500":
          description: "Erro interno do servidor"
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Erro interno"
      security:
        - api_key: []
      x-google-backend:
        address: https://mse-api-152754594972.southamerica-east1.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
        deadline: 180
