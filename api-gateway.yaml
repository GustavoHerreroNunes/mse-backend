          name: "vessel"
          required: true
          description: "Vessel data to be registered"
          schema:
            type: object
            required:
              - vessel_name
              - vessel_type
              - vessel_length
              - vessel_breadth
              - vessel_beam
              - vessel_depth
              - loaded_draft
              - light_draft
              - gross_tonnage
              - has_crane
            properties:
              imo_number:
                type: string
                description: "Número IMO único da embarcação"
                example: "9876543"
              vessel_name:
                type: string
                description: "Nome da embarcação"
                example: "NS Almirante"
              vessel_type:
                type: string
                description: "Tipo da embarcação (Barge, Tugboat)"
                example: "Barge"
              vessel_length:
                type: number
                description: "Comprimento em metros"
                example: 120.5
              vessel_breadth:
                type: number
                description: "Largura em metros"
                example: 25.3
              vessel_beam:
                type: number
                description: "Vão em metros"
                example: 22.8
              vessel_depth:
                type: number
                description: "Profundidade em metros"
                example: 15.2
              loaded_draft:
                type: number
                description: "Calado carregado em metros"
                example: 8.5
              light_draft:
                type: number
                description: "Calado leve em metros"
                example: 4.2
              gross_tonnage:
                type: number
                description: "Arqueação bruta"
                example: 15000
              bollard_pull:
                type: number
                description: "Força de reboque em toneladas (apenas para rebocadores)"
                example: 60
              has_crane:
                type: boolean
                description: "Indica se a embarcação possui guindastes"
                example: true
              country_flag:
                type: string
                description: "Bandeira do país de registro"
