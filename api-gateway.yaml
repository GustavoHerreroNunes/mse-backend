    post:
      tags:
        - Medicoes
      summary: Upload a tax invoice PDF to a survey demand's Drive folder
      description: |
        Registers a tax invoice (nota fiscal) PDF by uploading it to the associated survey demand's Google Drive folder.
        The PDF is stored in Google Drive and linked to the demand record.
      operationId: add_pdf_nota
      consumes:
        - multipart/form-data
      parameters:
        - in: header
          name: x-api-key
          required: true
          type: string
          description: "API key for authentication"
        - in: formData
          name: data
          required: true
          type: string
          description: 'JSON string containing the survey demand identifier. Example: {"id_demanda": 42}'
        - in: formData
          name: file
          type: string
          required: false
          description: "Tax invoice PDF file to be uploaded"
      responses:
        "201":
          description: "PDF adicionado com sucesso"
          schema:
            type: object
            properties:
              message:
                type: string
                example: "PDF added successfully"
              id_demanda:
                type: string
                properties:
                  id:
                    type: integer
                    description: "ID da demanda atualizada"
                    example: 78
        "400":
          description: "Requisição inválida ou nenhum PDF enviado"
          schema:
            type: object
            properties:
              error:
                type: string
                example: "No valid PDF uploaded"
        "404":
          description: "Demanda não encontrada"
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Demanda not found"
        "500":
          description: "Erro interno do servidor"
